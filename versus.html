<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catch them all! - 2 Player Bonus Power-Up Edition</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #ffd700; 
            margin: 0;
            padding: 0;
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
        }

        #console-wrapper {
            display: grid;
            grid-template-columns: 240px 1fr 240px; 
            width: 98vw;
            height: 95vh;
            max-height: 720px;
            max-width: 1200px;
            background-color: #3b4cca; 
            border-radius: 24px;
            padding: 15px;
            box-shadow: 0 16px 50px rgba(0,0,0,0.5);
            gap: 15px;
            box-sizing: border-box;
            align-items: center;
        }

        #screen-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #e0f7fa;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 24, 68, 0.98); 
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-overlay.show {
            display: flex;
        }

        .legendary-popup-active {
            border: 8px dashed #ff3333 !important;
            box-shadow: inset 0 0 40px rgba(255,0,0,0.6) !important;
        }

        .quiz-content-wrapper {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            width: 100%;
            margin: 10px 0;
        }

        .quiz-left-panel {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pokemon-image {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0px 8px 12px rgba(255,215,0,0.5));
            object-fit: contain;
            z-index: 2;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        #pokeball-svg-display {
            position: absolute;
            width: 90%;
            height: 90%;
            z-index: 3;
            display: none;
            filter: drop-shadow(0px 8px 15px rgba(255, 255, 255, 0.4));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .capture-star-svg {
            position: absolute;
            width: 30px;
            height: 30px;
            fill: #ffde00;
            z-index: 4;
            opacity: 0;
        }

        @keyframes burstOutVector {
            0% { transform: translate(0, 0) scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(180deg); opacity: 0; }
        }

        #popup-pokemon-message {
            font-size: 24px;
            color: #ffde00;
            font-weight: bold;
            text-shadow: 2px 2px 0px #3b4cca;
            text-align: center;
        }

        .legendary-alert {
            color: #ffffff !important;
            text-shadow: 3px 3px 0px #ff3333 !important;
            animation: bounce 0.3s infinite alternate;
        }

        #popup-question {
            font-size: 50px;
            font-weight: 900;
            color: #ff6f00; 
            text-shadow: 3px 3px 0px #5d4037, -1px -1px 0px #5d4037, 1px -1px 0px #5d4037, -1px 1px 0px #5d4037;
            margin-bottom: 5px;
            text-align: center;
        }

        #quiz-input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #math-popup input {
            font-size: 38px;
            font-family: inherit;
            font-weight: bold;
            width: 160px;
            text-align: center;
            border: 5px solid #ffde00;
            border-radius: 20px;
            padding: 6px;
            outline: none;
            color: #2a75bb;
            box-shadow: 0 6px 0px #b3a125;
        }

        #help-coop-btn {
            background-color: #00bcd4;
            color: white;
            border: 3px solid white;
            border-radius: 12px;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0px #00838f;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.1s ease;
        }

        #help-coop-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px #00838f;
        }

        #feedback-banner {
            font-size: 24px;
            font-weight: bold;
            min-height: 35px;
            text-align: center;
            margin-top: 5px;
        }

        .success-text { color: #00ff66; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .fail-text { color: #ff9800; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

        #gameover-title {
            font-size: 34px;
            color: #ffde00;
            text-shadow: 3px 3px #3b4cca;
            margin: 0 0 5px 0;
        }

        #final-scoreboards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            margin-bottom: 10px;
        }

        .player-summary-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px;
            border: 3px solid #fff;
            display: flex;
            flex-direction: column;
        }

        .player-summary-box.p1-box { border-color: #4caf50; background: rgba(76, 175, 80, 0.15); }
        .player-summary-box.p2-box { border-color: #f44336; background: rgba(244, 67, 54, 0.15); }

        .summary-header {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            padding-bottom: 3px;
        }
        .p1-box .summary-header { color: #81c784; }
        .p2-box .summary-header { color: #ef9a9a; }

        .summary-score {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 8px;
            color: #ffde00;
        }

        .caught-showcase-container {
            flex-grow: 1;
            height: 22vh; 
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 8px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .caught-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 8px;
        }

        .caught-card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid white;
        }

        .caught-card.legendary-card {
            border-color: #ff5252;
            background: rgba(255, 82, 82, 0.25);
        }

        .caught-card img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .caught-card span {
            font-size: 9px;
            color: #ffde00;
            margin-top: 2px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            width: 100%;
        }

        #restart-btn {
            font-family: inherit;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background-color: #4caf50;
            border: 4px solid #fff;
            padding: 8px 35px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .arcade-controls-flank {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #2b3a9c;
            border-radius: 16px;
            padding: 10px;
            box-sizing: border-box;
            border: 4px solid #fff;
        }

        #controls-p1 { border-color: #4caf50; }
        #controls-p2 { border-color: #f44336; }

        .control-label {
            color: #fff;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px #000;
        }

        .dpad-row {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .dpad-btn {
            width: 65px;
            height: 65px;
            margin: 4px;
            background-color: #e0e0e0; 
            border: 4px solid #fff;
            border-radius: 50%;
            color: #333;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            cursor: pointer;
        }

        #controls-p1 .dpad-btn { background-color: #2e7d32; color: #fff; box-shadow: 0 5px 0px #1b5e20; }
        #controls-p1 .dpad-btn:active { transform: translateY(3px); box-shadow: 0 2px 0px #1b5e20; }

        #controls-p2 .dpad-btn { background-color: #c62828; color: #fff; box-shadow: 0 5px 0px #2e0d0d; }
        #controls-p2 .dpad-btn:active { transform: translateY(3px); box-shadow: 0 2px 0px #2e0d0d; }

        .dpad-spacer {
            width: 65px;
            height: 65px;
            margin: 4px;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-4px); }
        }
    </style>
</head>
<body>

<audio id="audio-explore" loop preload="auto"><source src="explore.mp3" type="audio/mpeg"></audio>
<audio id="audio-battle" loop preload="auto"><source src="battle.mp3" type="audio/mpeg"></audio>
<audio id="audio-catch" preload="auto"><source src="catch.mp3" type="audio/mpeg"></audio>
<audio id="audio-runaway" preload="auto"><source src="runaway.mp3" type="audio/mpeg"></audio>

<div id="console-wrapper">
    <div class="arcade-controls-flank" id="controls-p1">
        <div class="control-label">🟢 PLAYER 1 (Green)</div>
        <div class="dpad-row"><div class="dpad-btn" id="p1-up">▲</div></div>
        <div class="dpad-row">
            <div class="dpad-btn" id="p1-left">◀</div>
            <div class="dpad-spacer"></div>
            <div class="dpad-btn" id="p1-right">▶</div>
        </div>
        <div class="dpad-row"><div class="dpad-btn" id="p1-down">▼</div></div>
    </div>

    <div id="screen-container">
        <div id="math-popup" class="game-overlay">
            <div id="popup-pokemon-message">Player triggered catch engine!</div>
            
            <div class="quiz-content-wrapper">
                <div class="quiz-left-panel" id="image-panel">
                    <img id="pokemon-image" src="" alt="Wild Pokemon">
                    <svg id="pokeball-svg-display" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="46" fill="#000000" />
                        <circle cx="50" cy="50" r="42" fill="#ffffff" />
                        <path d="M 8,50 A 42,42 0 0,1 92,50 Z" fill="#ff1c1c" />
                        <rect x="4" y="46" width="92" height="8" fill="#000000" />
                        <circle cx="50" cy="50" r="14" fill="#000000" />
                        <circle cx="50" cy="50" r="8" fill="#ffffff" />
                    </svg>
                </div>
                <div id="quiz-input-container">
                    <div id="popup-question">0 + 0 =</div>
                    <input type="number" id="math-answer" placeholder="?" autocomplete="off" pattern="[0-9]*" inputmode="numeric">
                    <button id="help-coop-btn">🤝 Ask Player for Help!</button>
                </div>
            </div>
            
            <div id="feedback-banner"></div>
        </div>

        <div id="gameover-popup" class="game-overlay">
            <h1 id="gameover-title">🏁 Match Complete! 🏁</h1>
            
            <div id="final-scoreboards">
                <div class="player-summary-box p1-box">
                    <div class="summary-header">Player 1 (Green)</div>
                    <div class="summary-score" id="p1-final-score">Points: 0</div>
                    <div class="caught-showcase-container" id="p1-showcase"></div>
                </div>
                <div class="player-summary-box p2-box">
                    <div class="summary-header">Player 2 (Red)</div>
                    <div class="summary-score" id="p2-final-score">Points: 0</div>
                    <div class="caught-showcase-container" id="p2-showcase"></div>
                </div>
            </div>

            <button id="restart-btn" onclick="initGame()">Rematch</button>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <div class="arcade-controls-flank" id="controls-p2">
        <div class="control-label">🔴 PLAYER 2 (Red)</div>
        <div class="dpad-row"><div class="dpad-btn" id="p2-up">▲</div></div>
        <div class="dpad-row">
            <div class="dpad-btn" id="p2-left">◀</div>
            <div class="dpad-spacer"></div>
            <div class="dpad-btn" id="p2-right">▶</div>
        </div>
        <div class="dpad-row"><div class="dpad-btn" id="p2-down">▼</div></div>
    </div>
</div>

<script>
    let userHasInteracted = false;
    let activeTrack = 'none';

    const audioExplore = document.getElementById("audio-explore");
    const audioBattle = document.getElementById("audio-battle");
    const audioCatch = document.getElementById("audio-catch");
    const audioRunaway = document.getElementById("audio-runaway");

    audioExplore.volume = 0.30;
    audioBattle.volume = 0.30;
    audioCatch.volume = 0.50; 
    audioRunaway.volume = 0.50; 

    function syncTrackState() {
        if (!userHasInteracted) return;
        if (isGameOver) {
            audioExplore.pause();
            audioBattle.pause();
            activeTrack = 'none';
            return;
        }
        if (isPaused) {
            if (activeTrack !== 'battle' && activeTrack !== 'sfx_playing') {
                audioExplore.pause();
                audioExplore.currentTime = 0; 
                audioBattle.play().catch(e => console.log(e));
                activeTrack = 'battle';
            }
        } else {
            if (activeTrack !== 'explore') {
                audioBattle.pause();
                audioBattle.currentTime = 0; 
                audioExplore.play()
                    .then(() => { activeTrack = 'explore'; })
                    .catch(e => {
                        setTimeout(() => { if(!isPaused && !isGameOver) audioExplore.play().catch(err => {}); }, 150);
                    });
            }
        }
    }

    function unlockAudioStream() {
        if (userHasInteracted) return;
        userHasInteracted = true;
        const contextAudioTracks = [audioExplore, audioBattle, audioCatch, audioRunaway];
        contextAudioTracks.forEach(track => {
            track.play().then(() => { track.pause(); track.currentTime = 0; }).catch(err => {});
        });
        setTimeout(() => { syncTrackState(); }, 100);
    }

    window.addEventListener("click", unlockAudioStream);
    window.addEventListener("touchstart", unlockAudioStream);

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    const mathPopup = document.getElementById("math-popup");
    const gameoverPopup = document.getElementById("gameover-popup");
    const pokemonMsg = document.getElementById("popup-pokemon-message");
    const pokemonImgElement = document.getElementById("pokemon-image");
    const pokeballSvgDisplay = document.getElementById("pokeball-svg-display");
    const imagePanel = document.getElementById("image-panel");
    const popupQuestion = document.getElementById("popup-question");
    const mathAnswerInput = document.getElementById("math-answer");
    const feedbackBanner = document.getElementById("feedback-banner");
    const helpCoopBtn = document.getElementById("help-coop-btn");

    const GRID_SIZE = 20;
    const HUD_HEIGHT = 100; 

    const POKEMON_LIST = [
        { id: "1", name: "Bulbasaur", tier: "normal" }, { id: "2", name: "Ivysaur", tier: "normal" }, { id: "3", name: "Venusaur", tier: "normal" },
        { id: "4", name: "Charmander", tier: "normal" }, { id: "5", name: "Charmeleon", tier: "normal" }, { id: "6", name: "Charizard", tier: "normal" },
        { id: "7", name: "Squirtle", tier: "normal" }, { id: "8", name: "Wartortle", tier: "normal" }, { id: "9", name: "Blastoise", tier: "normal" },
        { id: "12", name: "Butterfree", tier: "normal" }, { id: "25", name: "Pikachu", tier: "normal" }, { id: "26", name: "Raichu", tier: "normal" },
        { id: "35", name: "Clefairy", tier: "normal" }, { id: "37", name: "Vulpix", tier: "normal" }, { id: "38", name: "Ninetales", tier: "normal" },
        { id: "39", name: "Jigglypuff", tier: "normal" }, { id: "52", name: "Meowth", tier: "normal" }, { id: "54", name: "Psyduck", tier: "normal" },
        { id: "55", name: "Golduck", tier: "normal" }, { id: "58", name: "Growlithe", tier: "normal" }, { id: "59", name: "Arcanine", tier: "normal" },
        { id: "60", name: "Poliwag", tier: "normal" }, { id: "63", name: "Abra", tier: "normal" }, { id: "65", name: "Alakazam", tier: "normal" },
        { id: "77", name: "Ponyta", tier: "normal" }, { id: "78", name: "Rapidash", tier: "normal" }, { id: "79", name: "Slowpoke", tier: "normal" },
        { id: "92", name: "Gengar", tier: "normal" }, { id: "95", name: "Onix", tier: "normal" }, { id: "104", name: "Cubone", tier: "normal" },
        { id: "113", name: "Chansey", tier: "normal" }, { id: "131", name: "Lapras", tier: "normal" }, { id: "132", name: "Ditto", tier: "normal" },
        { id: "133", name: "Eevee", tier: "normal" }, { id: "134", name: "Vaporeon", tier: "normal" }, { id: "135", name: "Jolteon", tier: "normal" },
        { id: "136", name: "Flareon", tier: "normal" }, { id: "143", name: "Snorlax", tier: "normal" }, { id: "149", name: "Dragonite", tier: "normal" }, 
        { id: "175", name: "Togepi", tier: "normal" },

        { id: "144", name: "Articuno", tier: "legendary" }, 
        { id: "145", name: "Zapdos", tier: "legendary" }, 
        { id: "146", name: "Moltres", tier: "legendary" }, 
        { id: "150", name: "Mewtwo", tier: "legendary" }, 
        { id: "151", name: "Mew", tier: "legendary" },
        { id: "382", name: "Kyogre", tier: "legendary" },  
        { id: "791", name: "Solgaleo", tier: "legendary" }, 
        { id: "1007", name: "Koraidon", tier: "legendary" },
        { id: "249", name: "Lugia", tier: "legendary" },   
        { id: "250", name: "Ho-Oh", tier: "legendary" }    
    ];

    let snake1, dir1, nextDir1, baseSpeed1;
    let snake2, dir2, nextDir2, baseSpeed2;
    let grow1 = 0, grow2 = 0;
    
    let p1Points = 0, p2Points = 0;
    let p1Caught = [], p2Caught = [];

    let p1StarTime = 0, p1WormTime = 0;
    let p2StarTime = 0, p2WormTime = 0;

    let pokeballsEatenCounter = 0;
    let nextBonusTargetInterval = 2; 

    let questionActiveSourcePlayer = 1; 
    let activeQuizMode = "SOLO"; 
    
    const MATCH_TOTAL_SECONDS = 15 * 60; 
    let matchTimeRemaining = MATCH_TOTAL_SECONDS;
    let systemClockIntervalId = null;

    let currentQuestion, activeFoodPokeball, activeSpecialItem;
    let lastRenderTime = 0;
    let isPaused = false;
    let isGameOver = false; 
    let isProcessingAnswer = false; 
    let gameFrameCount = 0; 
    let animationFrameId = null;
    let confettiParticles = [];
    let availablePokemonDeck = [];

    function shuffleDeck() {
        for (let i = availablePokemonDeck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [availablePokemonDeck[i], availablePokemonDeck[j]] = [availablePokemonDeck[j], availablePokemonDeck[i]];
        }
    }

    function runMatchClockStep() {
        if (!isPaused && !isGameOver) {
            matchTimeRemaining--;
            
            if (p1StarTime > 0) p1StarTime--;
            if (p1WormTime > 0) p1WormTime--;
            if (p2StarTime > 0) p2StarTime--;
            if (p2WormTime > 0) p2WormTime--;

            if (matchTimeRemaining <= 0) {
                matchTimeRemaining = 0;
                triggerGameOver();
            }
        }
    }

    function initGame() {
        gameoverPopup.classList.remove("show");
        mathPopup.classList.remove("show");
        mathPopup.classList.remove("legendary-popup-active");

        snake1 = [{x: 160, y: 200}, {x: 140, y: 200}, {x: 120, y: 200}];
        dir1 = "RIGHT"; nextDir1 = "RIGHT"; baseSpeed1 = 2.5; grow1 = 0;
        p1Points = 0; p1Caught = [];
        p1StarTime = 0; p1WormTime = 0;

        snake2 = [{x: 640, y: 440}, {x: 660, y: 440}, {x: 680, y: 440}];
        dir2 = "LEFT"; nextDir2 = "LEFT"; baseSpeed2 = 2.5; grow2 = 0;
        p2Points = 0; p2Caught = [];
        p2StarTime = 0; p2WormTime = 0;

        pokeballsEatenCounter = 0;
        determineNextBonusInterval();

        matchTimeRemaining = MATCH_TOTAL_SECONDS;
        if(systemClockIntervalId) clearInterval(systemClockIntervalId);
        systemClockIntervalId = setInterval(runMatchClockStep, 1000);

        confettiParticles = [];
        isPaused = false;
        isGameOver = false;
        isProcessingAnswer = false;
        
        activeTrack = 'none';
        syncTrackState();

        availablePokemonDeck = [...POKEMON_LIST];
        shuffleDeck();
        
        spawnFoodPokeball();
        activeSpecialItem = null; 
        
        lastRenderTime = performance.now();
        if (!animationFrameId) {
            animationFrameId = window.requestAnimationFrame(mainGameLoop);
        }
    }

    function determineNextBonusInterval() {
        nextBonusTargetInterval = Math.floor(Math.random() * 3) + 1; 
    }

    function generateQuestion(tier) {
        let num1, num2, ans, text;
        if (tier === "legendary") {
            const randType = Math.random();
            if (randType < 0.5) {
                num1 = Math.floor(Math.random() * 9) + 1; num2 = Math.floor(Math.random() * 9) + 1;
                ans = num1 * num2; text = `${num1} × ${num2}`;
            } else {
                if (Math.random() > 0.5) {
                    num1 = Math.floor(Math.random() * 240) + 100; num2 = Math.floor(Math.random() * 150) + 100;
                    ans = num1 + num2; text = `${num1} + ${num2}`;
                } else {
                    num1 = Math.floor(Math.random() * 300) + 199; num2 = Math.floor(Math.random() * (num1 - 100)) + 100;
                    ans = num1 - num2; text = `${num1} - ${num2}`;
                }
            }
        } else {
            if (Math.random() > 0.5) {
                num1 = Math.floor(Math.random() * 90) + 10; num2 = Math.floor(Math.random() * 89) + 10;
                ans = num1 + num2; text = `${num1} + ${num2}`;
            } else {
                num1 = Math.floor(Math.random() * 90) + 10; num2 = Math.floor(Math.random() * (num1 - 1)) + 1;
                ans = num1 - num2; text = `${num1} - ${num2}`;
            }
        }
        return { text: text, answer: ans };
    }

    function getRandomGridPos() {
        let pos;
        const totalCols = canvas.width / GRID_SIZE;  
        const grassStartRow = HUD_HEIGHT / GRID_SIZE; 
        const totalGrassRows = (canvas.height - HUD_HEIGHT) / GRID_SIZE; 
        const targetRowRange = Math.floor(totalGrassRows * (5 / 6)); 

        while (true) {
            const gridX = Math.floor(Math.random() * totalCols);
            const gridY = Math.floor(Math.random() * targetRowRange) + grassStartRow;
            const x = gridX * GRID_SIZE;
            const y = gridY * GRID_SIZE;

            if (y < HUD_HEIGHT || y >= canvas.height) continue;

            const c1 = snake1.some(seg => seg.x === x && seg.y === y);
            const c2 = snake2.some(seg => seg.x === x && seg.y === y);
            const cFood = activeFoodPokeball && activeFoodPokeball.pos.x === x && activeFoodPokeball.pos.y === y;
            const cSpec = activeSpecialItem && activeSpecialItem.pos.x === x && activeSpecialItem.pos.y === y;
            
            if (!c1 && !c2 && !cFood && !cSpec) {
                pos = {x, y};
                break;
            }
        }
        return pos;
    }

    function spawnFoodPokeball() {
        activeFoodPokeball = {
            pos: getRandomGridPos(),
            name: "Pokeball"
        };
    }

    function checkAndSpawnSpecialItem() {
        if (activeSpecialItem) return; 
        if (pokeballsEatenCounter >= nextBonusTargetInterval) {
            pokeballsEatenCounter = 0; 
            determineNextBonusInterval();
            
            const randomType = Math.random() < 0.5 ? "star" : "worm";
            activeSpecialItem = {
                pos: getRandomGridPos(),
                name: randomType
            };
        }
    }

    helpCoopBtn.addEventListener("click", function() {
        if(activeQuizMode !== "SOLO" || isProcessingAnswer) return;
        activeQuizMode = "COOP";
        helpCoopBtn.style.display = "none";
        pokemonMsg.textContent = `🤝 Teamwork! Both players working together to catch ${currentSelectedPokemon.name}!`;

    });

    function triggerStarBurstVector() {
        const colors = ['#ffde00', '#ff6f00', '#ffffff', '#00ff66', '#00ffff'];
        for (let i = 0; i < 12; i++) {
            const svgNamespace = "http://www.w3.org/2000/svg";
            const starSvg = document.createElementNS(svgNamespace, "svg");
            starSvg.setAttribute("class", "capture-star-svg");
            starSvg.setAttribute("viewBox", "0 0 20 20");
            
            const path = document.createElementNS(svgNamespace, "path");
            path.setAttribute("d", "M10 0L13.09 6.26L20 7.27L15 12.14L16.18 19.02L10 15.77L3.82 19.02L5 12.14L0 7.27L6.91 6.26L10 0Z");
            path.setAttribute("fill", colors[Math.floor(Math.random() * colors.length)]);
            
            starSvg.appendChild(path);
            
            const angle = (i * 30) * (Math.PI / 180);
            const distance = Math.floor(Math.random() * 40) + 60; 
            const tx = Math.cos(angle) * distance + 'px';
            const ty = Math.sin(angle) * distance + 'px';
            
            starSvg.style.setProperty('--tx', tx);
            starSvg.style.setProperty('--ty', ty);
            starSvg.style.animation = `burstOutVector 0.9s forwards cubic-bezier(0.1, 0.8, 0.3, 1)`;
            
            imagePanel.appendChild(starSvg);
        }
    }

    function triggerGameOver() {
        isGameOver = true;
        isPaused = true;
        if(systemClockIntervalId) clearInterval(systemClockIntervalId);
        syncTrackState(); 

        document.getElementById("p1-final-score").textContent = `Points: ${p1Points}`;
        document.getElementById("p2-final-score").textContent = `Points: ${p2Points}`;

        function populateGrid(displayContainerId, arrayDeck) {

            container.innerHTML = "";

    function createConfetti() {
        confettiParticles = [];
        const colors = ['#ffd700', '#ff3333', '#3333ff', '#33ff33', '#ff00ff', '#00ffff'];
        for (let i = 0; i < 80; i++) {
            confettiParticles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * (HUD_HEIGHT - 50) + HUD_HEIGHT, 
                r: Math.random() * 5 + 3,
                d: Math.random() * canvas.height,
                color: colors[Math.floor(Math.random() * colors.length)],
                tilt: Math.random() * 10 - 5,
                tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                tiltAngle: 0
            });
        }
    }

    function updateAndDrawConfetti() {
        confettiParticles.forEach((p) => {
            p.tiltAngle += p.tiltAngleIncremental;
            p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2; 
            p.x += Math.sin(p.tiltAngle);
            p.tilt = Math.sin(p.tiltAngle - confettiParticles.indexOf(p) / 3) * 15;

            if (p.y > canvas.height) {
                p.y = HUD_HEIGHT - 10;
                p.x = Math.random() * canvas.width;
            }

            ctx.save();
            ctx.lineWidth = p.r;
            ctx.strokeStyle = p.color;
            ctx.beginPath();
            ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
            ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
            ctx.stroke();
            ctx.restore();
        });
    }

    function handleBonusCollection(playerNum, bonusType) {
        if (bonusType === "star") {
            if (playerNum === 1) p1StarTime = 30; else p2StarTime = 30;
            // Play an enthusiastic catch burst sound variant for Star consumption
            audioCatch.currentTime = 0;
            audioCatch.playbackRate = 1.4; 
            audioCatch.play().catch(e => {});
        } else if (bonusType === "worm") {
            if (playerNum === 1) p2WormTime = 15; else p1WormTime = 15;
            // Play a slightly modulated catch sound variant for Worm interaction
            audioCatch.currentTime = 0;
            audioCatch.playbackRate = 0.75; 
            audioCatch.play().catch(e => {});
        }
        
        // Reset playback rate back to standard state
        setTimeout(() => { audioCatch.playbackRate = 1.0; }, 1000);
        
        activeSpecialItem = null; 
    }

    mathAnswerInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") processMathAnswer();
    });

    function processMathAnswer() {
        if (isProcessingAnswer || mathAnswerInput.value.trim() === "") return;
        isProcessingAnswer = true; 
        const playerAnswer = parseInt(mathAnswerInput.value);
        audioBattle.pause();

        const baseRewardPoints = (currentSelectedPokemon.tier === "legendary") ? 4 : 2;

        if (playerAnswer === currentQuestion.answer) {
            activeTrack = 'sfx_playing';
            audioCatch.currentTime = 0; 
            audioCatch.play().catch(e => console.log(e));

            if (activeQuizMode === "COOP") {
                const sharedSlice = baseRewardPoints / 2;
                p1Points += sharedSlice;
                p2Points += sharedSlice;
                p1Caught.push(currentSelectedPokemon);
                p2Caught.push({...currentSelectedPokemon, name: currentSelectedPokemon.name + " 🤝"});
            } else {
                if (questionActiveSourcePlayer === 1) {
                    p1Points += baseRewardPoints;
                    p1Caught.push(currentSelectedPokemon);
                    grow1 += 1; baseSpeed1 += 0.2;
                } else {
                    p2Points += baseRewardPoints;
                    p2Caught.push(currentSelectedPokemon);
                    grow2 += 1; baseSpeed2 += 0.2;
                }
            }
            
            pokemonImgElement.style.transform = "scale(0)";
            pokemonImgElement.style.opacity = "0";

            setTimeout(() => {
                pokemonImgElement.style.display = "none";
                pokeballSvgDisplay.style.display = "block";
                setTimeout(() => {
                    pokeballSvgDisplay.style.transform = "scale(1.1) rotate(360deg)";
                    triggerStarBurstVector();
                }, 40);
            }, 250);

            feedbackBanner.textContent = `Excellent! ${currentSelectedPokemon.name} was successfully caught!`;
            feedbackBanner.className = "success-text";

            setTimeout(() => {
                mathPopup.classList.remove("show");
                isPaused = false;
                isProcessingAnswer = false;
                if (availablePokemonDeck.length === 0) {
                    triggerGameOver();
                } else {
                    syncTrackState();
                    spawnFoodPokeball();
                    lastRenderTime = performance.now();
                }
            }, 3500); 
        } else {
            activeTrack = 'sfx_playing';
            audioRunaway.currentTime = 0;
            audioRunaway.play().catch(e => console.log(e));

            if (activeQuizMode === "COOP") {
                feedbackBanner.textContent = "Incorrect! The Pokémon slipped away from both players!";
                feedbackBanner.className = "fail-text";
                availablePokemonDeck.push(currentSelectedPokemon);
                shuffleDeck();

                pokemonImgElement.style.transform = "scale(0.3) rotate(90deg)";
                pokemonImgElement.style.opacity = "0";

                setTimeout(() => {
                    mathPopup.classList.remove("show");
                    isPaused = false;
                    isProcessingAnswer = false;
                    syncTrackState();
                    spawnFoodPokeball();
                    lastRenderTime = performance.now();
                }, 3000);

            } else if (activeQuizMode === "SOLO") {
                activeQuizMode = "STEAL";
                isProcessingAnswer = false; 
                helpCoopBtn.style.display = "none"; 

                const targetStealerId = (questionActiveSourcePlayer === 1) ? 2 : 1;
                questionActiveSourcePlayer = targetStealerId; 

                const opponentLabel = targetStealerId === 1 ? "Player 1 (Green)" : "Player 2 (Red)";
                feedbackBanner.textContent = `Wrong! ${opponentLabel}, your chance to STEAL!`;
                feedbackBanner.className = "fail-text";
                
                pokemonMsg.textContent = `🎯 STEAL ATTEMPT! ${opponentLabel}: Catch ${currentSelectedPokemon.name}!`;
                mathAnswerInput.value = "";
                setTimeout(() => mathAnswerInput.focus(), 50);

            } else if (activeQuizMode === "STEAL") {
                feedbackBanner.textContent = `Steal failed! ${currentSelectedPokemon.name} escaped completely!`;
                feedbackBanner.className = "fail-text";
                availablePokemonDeck.push(currentSelectedPokemon);
                shuffleDeck();

                pokemonImgElement.style.transform = "translateX(250px) scale(0.2)";
                pokemonImgElement.style.opacity = "0";

                setTimeout(() => {
                    mathPopup.classList.remove("show");
                    isPaused = false;
                    isProcessingAnswer = false;
                    syncTrackState();
                    spawnFoodPokeball();
                    lastRenderTime = performance.now();
                }, 3000);
            }
        }
    }

    function calculateCurrentSpeedP1() {
        let outSpeed = baseSpeed1;
        if (p1StarTime > 0) outSpeed *= 1.5;
        if (p1WormTime > 0) outSpeed *= 0.5;
        return outSpeed;
    }

    function calculateCurrentSpeedP2() {
        let outSpeed = baseSpeed2;
        if (p2StarTime > 0) outSpeed *= 1.5;
        if (p2WormTime > 0) outSpeed *= 0.5;
        return outSpeed;
    }

    function mainGameLoop(currentTime) {
        animationFrameId = window.requestAnimationFrame(mainGameLoop);
        if (isPaused) {
            if (isGameOver) draw(); 
            return;
        }
        
        const elapsed = (currentTime - lastRenderTime) / 1000;
        const highestActiveSpeed = Math.max(calculateCurrentSpeedP1(), calculateCurrentSpeedP2());
        if (elapsed < 1 / highestActiveSpeed) return;
        
        lastRenderTime = currentTime;
        update();
        draw();
    }

    function formatTime(totalSeconds) {
        const mins = Math.floor(totalSeconds / 60);
        const secs = totalSeconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function update() {
        gameFrameCount++;
        
        dir1 = nextDir1;
        const head1 = {x: snake1[0].x, y: snake1[0].y};
        if (dir1 === "UP") head1.y -= GRID_SIZE;
        else if (dir1 === "DOWN") head1.y += GRID_SIZE;
        else if (dir1 === "LEFT") head1.x -= GRID_SIZE;
        else if (dir1 === "RIGHT") head1.x += GRID_SIZE;

        dir2 = nextDir2;
        const head2 = {x: snake2[0].x, y: snake2[0].y};
        if (dir2 === "UP") head2.y -= GRID_SIZE;
        else if (dir2 === "DOWN") head2.y += GRID_SIZE;
        else if (dir2 === "LEFT") head2.x -= GRID_SIZE;
        else if (dir2 === "RIGHT") head2.x += GRID_SIZE;

        if (head1.x >= canvas.width) head1.x = 0;
        else if (head1.x < 0) head1.x = canvas.width - GRID_SIZE;
        if (head1.y >= canvas.height) head1.y = HUD_HEIGHT;
        else if (head1.y < HUD_HEIGHT) head1.y = canvas.height - GRID_SIZE;

        if (head2.x >= canvas.width) head2.x = 0;
        else if (head2.x < 0) head2.x = canvas.width - GRID_SIZE;
        if (head2.y >= canvas.height) head2.y = HUD_HEIGHT;
        else if (head2.y < HUD_HEIGHT) head2.y = canvas.height - GRID_SIZE;

        const s1SelfCrash = snake1.some((seg, idx) => idx !== 0 && seg.x === head1.x && seg.y === head1.y);
        const s2SelfCrash = snake2.some((seg, idx) => idx !== 0 && seg.x === head2.x && seg.y === head2.y);
        
        if (s1SelfCrash || s2SelfCrash) {
            triggerGameOver();
            return;
        }

        // --- Player 1 Actions ---
        snake1.unshift(head1);
        // Collision checking for Pokéball
        if (activeFoodPokeball && head1.x === activeFoodPokeball.pos.x && head1.y === activeFoodPokeball.pos.y) {
            pokeballsEatenCounter++;
            checkAndSpawnSpecialItem(); 
            triggerMathPopup(1);
            snake1.pop();
        } 
        // Collision checking for independent Special Item
        else if (activeSpecialItem && head1.x === activeSpecialItem.pos.x && head1.y === activeSpecialItem.pos.y) {
            handleBonusCollection(1, activeSpecialItem.name);
            if (grow1 > 0) grow1--; else snake1.pop();
        } else {
            if (grow1 > 0) grow1--; else snake1.pop();
        }

        // --- Player 2 Actions ---
        snake2.unshift(head2);
        // Collision checking for Pokéball
        if (activeFoodPokeball && head2.x === activeFoodPokeball.pos.x && head2.y === activeFoodPokeball.pos.y) {
            pokeballsEatenCounter++;
            checkAndSpawnSpecialItem(); 
            triggerMathPopup(2);
            snake2.pop();
        } 
        // Collision checking for independent Special Item
        else if (activeSpecialItem && head2.x === activeSpecialItem.pos.x && head2.y === activeSpecialItem.pos.y) {
            handleBonusCollection(2, activeSpecialItem.name);
            if (grow2 > 0) grow2--; else snake2.pop();
        } else {
            if (grow2 > 0) grow2--; else snake2.pop();
        }
    }

    function drawRoundRect(ctx, x, y, width, height, radius, fill) {
        if (typeof radius === 'number') { radius = {tl: radius, tr: radius, br: radius, bl: radius}; }
        ctx.beginPath(); ctx.moveTo(x + radius.tl, y); ctx.lineTo(x + width - radius.tr, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius.tr); ctx.lineTo(x + width, y + height - radius.br);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius.br, y + height); ctx.lineTo(x + radius.bl, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius.bl); ctx.lineTo(x, y + radius.tl);
        ctx.quadraticCurveTo(x, y, x + radius.tl, y); ctx.closePath();
        if (fill) ctx.fill();
    }

    function drawPokeball(x, y, radius, angle = 0) {
        ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
        ctx.lineWidth = radius * 0.1; ctx.strokeStyle = "#000"; ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#ff0000"; ctx.beginPath(); ctx.arc(0, 0, radius, Math.PI, 0); ctx.lineTo(0, 0); ctx.fill(); ctx.stroke();
        ctx.lineWidth = radius * 0.15; ctx.beginPath(); ctx.moveTo(-radius, 0); ctx.lineTo(radius, 0); ctx.stroke();
        ctx.fillStyle = "#fff"; ctx.lineWidth = radius * 0.1; ctx.beginPath(); ctx.arc(0, 0, radius * 0.3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.restore();
    }

    function drawStarItem(x, y, radius, time) {
        ctx.save(); ctx.translate(x, y); ctx.rotate(time * 0.05);
        ctx.fillStyle = "#ffeb3b"; ctx.strokeStyle = "#f57f17"; ctx.lineWidth = 2;
        ctx.shadowBlur = 15; ctx.shadowColor = "#fff59d";
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
            ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * radius, -Math.sin((18 + i * 72) * Math.PI / 180) * radius);
            ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * (radius/2), -Math.sin((54 + i * 72) * Math.PI / 180) * (radius/2));
        }
        ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
    }

    function drawWormItem(x, y, radius, time) {
        ctx.save(); ctx.translate(x, y);
        // Changed to neon magenta pink and black accents for crystal clear contrast
        ctx.fillStyle = "#ff007f"; ctx.strokeStyle = "#000000"; ctx.lineWidth = 2;
        ctx.shadowBlur = 14; ctx.shadowColor = "#ff007f";
        ctx.beginPath();
        for(let i=0; i<6; i++) {
            let offset = Math.sin(time*0.25 + i)*3.5;
            ctx.arc((i-2.5)*4, offset, radius*0.4, 0, Math.PI*2);
        }
        ctx.fill(); ctx.stroke();
        // Visible Eyes
        ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(8, -1, 2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#000000"; ctx.beginPath(); ctx.arc(8, -1, 1, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    function drawGrass(x, y, width, height) {
        ctx.fillStyle = "#81c784"; ctx.fillRect(x, y, width, height);
        ctx.fillStyle = "#4caf50";
        for (let i = 0; i < 40; i++) {
            const seed = Math.sin(i * 9.8) * 10000;
            const tx = x + (seed - Math.floor(seed)) * width;
            const ty = y + ((seed * 10) - Math.floor(seed * 10)) * height;
            ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx - 2, ty + 6); ctx.lineTo(tx + 2, ty + 6); ctx.fill();
        }
    }

    function drawSnakes() {
        snake1.forEach((segment, index) => {
            const x = segment.x + GRID_SIZE/2; const y = segment.y + GRID_SIZE/2;
            if (index === 0) {
                ctx.fillStyle = "#1b5e20"; ctx.beginPath(); ctx.arc(x, y, GRID_SIZE/2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(x - 5, y - 3, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 5, y - 3, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(x - 5, y - 3, 1.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 5, y - 3, 1.5, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.fillStyle = (index % 2 === 0) ? "#2e7d32" : "#4caf50";
                drawRoundRect(ctx, segment.x + 1, segment.y + 1, GRID_SIZE - 2, GRID_SIZE - 2, 5, true);
            }
        });

        snake2.forEach((segment, index) => {
            const x = segment.x + GRID_SIZE/2; const y = segment.y + GRID_SIZE/2;
            if (index === 0) {
                ctx.fillStyle = "#b71c1c"; ctx.beginPath(); ctx.arc(x, y, GRID_SIZE/2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(x - 5, y - 3, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 5, y - 3, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(x - 5, y - 3, 1.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 5, y - 3, 1.5, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.fillStyle = (index % 2 === 0) ? "#d32f2f" : "#ffcdd2";
                drawRoundRect(ctx, segment.x + 1, segment.y + 1, GRID_SIZE - 2, GRID_SIZE - 2, 5, true);
            }
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGrass(0, HUD_HEIGHT, canvas.width, canvas.height - HUD_HEIGHT);
        
        ctx.fillStyle = "#4caf50"; ctx.fillRect(0, 0, canvas.width / 2, HUD_HEIGHT);
        ctx.fillStyle = "#f44336"; ctx.fillRect(canvas.width / 2, 0, canvas.width / 2, HUD_HEIGHT);
        
        ctx.textBaseline = "middle"; ctx.fillStyle = "#fff"; ctx.strokeStyle = "rgba(0,0,0,0.4)"; ctx.lineWidth = 4;
        // Cleaned font to bold sans-serif
        ctx.font = "bold 22px Arial, Helvetica, sans-serif"; 

        // P1 Status Panel
        ctx.textAlign = "left";
        let p1Tag = `🟢 P1 Score: ${p1Points}`;
        if (p1StarTime > 0) p1Tag += ` 🌟(${p1StarTime}s)`;
        if (p1WormTime > 0) p1Tag += ` 🪱🤢(${p1WormTime}s)`;
        ctx.strokeText(p1Tag, 15, HUD_HEIGHT / 2); ctx.fillText(p1Tag, 15, HUD_HEIGHT / 2);

        // P2 Status Panel
        ctx.textAlign = "right";
        let p2Tag = `🔴 P2 Score: ${p2Points}`;
        if (p2StarTime > 0) p2Tag += ` 🌟(${p2StarTime}s)`;
        if (p2WormTime > 0) p2Tag += ` 🪱🤢(${p2WormTime}s)`;
        ctx.strokeText(p2Tag, canvas.width - 15, HUD_HEIGHT / 2); ctx.fillText(p2Tag, canvas.width - 15, HUD_HEIGHT / 2);

        // Central Arena Clock Display
        ctx.save(); ctx.fillStyle = "#222"; ctx.strokeStyle = "#ffde00"; ctx.lineWidth = 3;
        drawRoundRect(ctx, canvas.width / 2 - 70, HUD_HEIGHT / 2 - 25, 140, 50, 10, true); ctx.stroke();
        ctx.fillStyle = "#ffde00"; ctx.font = "bold 24px monospace"; ctx.textAlign = "center";
        ctx.fillText(formatTime(matchTimeRemaining), canvas.width / 2, HUD_HEIGHT / 2); ctx.restore();

        ctx.strokeStyle = "#000"; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(0, HUD_HEIGHT); ctx.lineTo(canvas.width, HUD_HEIGHT); ctx.stroke();

        // Render targets safely
        if (!isGameOver) {
            if (activeFoodPokeball) {
                const px = activeFoodPokeball.pos.x + GRID_SIZE/2;
                const py = activeFoodPokeball.pos.y + GRID_SIZE/2;
                const pr = GRID_SIZE/2 * (1 + Math.sin(gameFrameCount * 0.15) * 0.08);
                ctx.save(); ctx.shadowBlur = 10; ctx.shadowColor = "#ff0000";
                drawPokeball(px, py, pr);
                ctx.restore();
            }
            if (activeSpecialItem) {
                const sx = activeSpecialItem.pos.x + GRID_SIZE/2;
                const sy = activeSpecialItem.pos.y + GRID_SIZE/2;
                if (activeSpecialItem.name === "star") {
                    drawStarItem(sx, sy, GRID_SIZE * 0.6, gameFrameCount);
                } else if (activeSpecialItem.name === "worm") {
                    drawWormItem(sx, sy, GRID_SIZE * 0.5, gameFrameCount);
                }
            }
        }
        
        drawSnakes();
        if (isGameOver) updateAndDrawConfetti();
    }

    function handleInputP1(targetDir) {
        if (isPaused) return;
        if (targetDir === "UP" && dir1 !== "DOWN") nextDir1 = "UP";
        if (targetDir === "DOWN" && dir1 !== "UP") nextDir1 = "DOWN";
        if (targetDir === "LEFT" && dir1 !== "RIGHT") nextDir1 = "LEFT";
        if (targetDir === "RIGHT" && dir1 !== "LEFT") nextDir1 = "RIGHT";
    }

    function handleInputP2(targetDir) {
        if (isPaused) return;
        if (targetDir === "UP" && dir2 !== "DOWN") nextDir2 = "UP";
        if (targetDir === "DOWN" && dir2 !== "UP") nextDir2 = "DOWN";
        if (targetDir === "LEFT" && dir2 !== "RIGHT") nextDir2 = "LEFT";
        if (targetDir === "RIGHT" && dir2 !== "LEFT") nextDir2 = "RIGHT";
    }

    document.getElementById("p1-up").addEventListener("touchstart", (e) => { e.preventDefault(); handleInputP1("UP"); });
    document.getElementById("p1-down").addEventListener("touchstart", (e) => { e.preventDefault(); handleInputP1("DOWN"); });
    document.getElementById("p1-left").addEventListener("touchstart", (e) => { e.preventDefault(); handleInputP1("LEFT"); });
    document.getElementById("p1-right").addEventListener("touchstart", (e) => { e.preventDefault(); handleInputP1("RIGHT"); });

    document.getElementById("p2-up").addEventListener("touchstart", (e) => { e.preventDefault(); handleInputP2("UP"); });
    document.getElementById("p2-down").addEventListener("touchstart", (e) => { e.preventDefault(); handleInputP2("DOWN"); });
    document.getElementById("p2-left").addEventListener("touchstart", (e) => { e.preventDefault(); handleInputP2("LEFT"); });
    document.getElementById("p2-right").addEventListener("touchstart", (e) => { e.preventDefault(); handleInputP2("RIGHT"); });

    initGame();
</script>
</body>
</html>
