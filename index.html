<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catch them all! - iPad Landscape Edition</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background-color: #ffd700; 
            margin: 0;
            padding: 0;
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
        }

        /* Fixed structural grid to guarantee both game screen and buttons stay side-by-side */
        #console-wrapper {
            display: grid;
            grid-template-columns: 1fr 320px; /* Rigidly maps out 320px for controls, rest for screen */
            width: 95vw;
            height: 90vh;
            max-height: 700px;
            max-width: 1050px;
            background-color: #3b4cca; 
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 16px 50px rgba(0,0,0,0.5);
            gap: 20px;
            box-sizing: border-box;
            align-items: center;
        }

        #screen-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #e0f7fa;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 24, 68, 0.98); 
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-overlay.show {
            display: flex;
        }

        .legendary-popup-active {
            border: 8px dashed #ff3333 !important;
            box-shadow: inset 0 0 40px rgba(255,0,0,0.6) !important;
        }

        .quiz-content-wrapper {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            width: 100%;
            margin: 15px 0;
        }

        .quiz-left-panel {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pokemon-image {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0px 8px 12px rgba(255,215,0,0.5));
            object-fit: contain;
            z-index: 2;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        #pokeball-svg-display {
            position: absolute;
            width: 90%;
            height: 90%;
            z-index: 3;
            display: none;
            filter: drop-shadow(0px 8px 15px rgba(255, 255, 255, 0.4));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .capture-star-svg {
            position: absolute;
            width: 35px;
            height: 35px;
            fill: #ffde00;
            z-index: 4;
            opacity: 0;
        }

        @keyframes burstOutVector {
            0% { transform: translate(0, 0) scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(180deg); opacity: 0; }
        }

        #popup-pokemon-message {
            font-size: 26px;
            color: #ffde00;
            font-weight: bold;
            text-shadow: 2px 2px 0px #3b4cca;
            text-align: center;
        }

        .legendary-alert {
            color: #ffffff !important;
            text-shadow: 3px 3px 0px #ff3333 !important;
            animation: bounce 0.3s infinite alternate;
        }

        #popup-question {
            font-size: 60px;
            font-weight: 900;
            color: #ff6f00; 
            text-shadow: 3px 3px 0px #5d4037, -1px -1px 0px #5d4037, 1px -1px 0px #5d4037, -1px 1px 0px #5d4037;
            margin-bottom: 10px;
        }

        #math-popup input {
            font-size: 45px;
            font-family: inherit;
            font-weight: bold;
            width: 180px;
            text-align: center;
            border: 5px solid #ffde00;
            border-radius: 20px;
            padding: 8px;
            outline: none;
            color: #2a75bb;
            box-shadow: 0 6px 0px #b3a125;
        }

        #feedback-banner {
            font-size: 26px;
            font-weight: bold;
            min-height: 40px;
            text-align: center;
            margin-top: 10px;
        }

        .success-text { color: #00ff66; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .fail-text { color: #ff9800; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

        #gameover-title {
            font-size: 38px;
            color: #ffde00;
            text-shadow: 3px 3px #3b4cca;
            margin: 0 0 10px 0;
        }

        #gameover-caught-counter {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        #caught-showcase-container {
            width: 100%;
            height: 40vh; 
            background: rgba(255, 255, 255, 0.15);
            border: 3px dashed #ffde00;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .showcase-section-title {
            font-size: 18px;
            color: #ffde00;
            font-weight: bold;
            margin: 10px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.3);
        }

        .showcase-section-title.legendary-header { color: #ff5252; }

        .caught-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .caught-card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid white;
        }

        .caught-card.legendary-card {
            border-color: #ff5252;
            background: rgba(255, 82, 82, 0.25);
        }

        .caught-card img {
            width: 55px;
            height: 55px;
            object-fit: contain;
        }

        .caught-card span {
            font-size: 11px;
            color: #ffde00;
            margin-top: 4px;
            text-align: center;
        }

        #restart-btn {
            font-family: inherit;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background-color: #4caf50;
            border: 4px solid #fff;
            padding: 10px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #arcade-controls {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #2b3a9c;
            border-radius: 16px;
            padding: 15px;
            box-sizing: border-box;
            border: 4px solid #fff;
        }

        .dpad-row {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .dpad-btn {
            width: 85px;
            height: 85px;
            margin: 6px;
            background-color: #f44336; 
            border: 5px solid #fff;
            border-radius: 50%;
            box-shadow: 0 6px 0px #b71c1c;
            color: white;
            font-size: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            cursor: pointer;
        }

        .dpad-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #b71c1c;
            background-color: #d32f2f;
        }

        .dpad-spacer {
            width: 85px;
            height: 85px;
            margin: 6px;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-4px); }
        }
    </style>
</head>
<body>

<audio id="audio-explore" loop preload="auto"><source src="explore.mp3" type="audio/mpeg"></audio>
<audio id="audio-battle" loop preload="auto"><source src="battle.mp3" type="audio/mpeg"></audio>
<audio id="audio-catch" preload="auto"><source src="catch.mp3" type="audio/mpeg"></audio>
<audio id="audio-runaway" preload="auto"><source src="runaway.mp3" type="audio/mpeg"></audio>

<div id="console-wrapper">
    <div id="screen-container">
        <div id="math-popup" class="game-overlay">
            <div id="popup-pokemon-message">Fill in to catch Pikachu!</div>
            
            <div class="quiz-content-wrapper">
                <div class="quiz-left-panel" id="image-panel">
                    <img id="pokemon-image" src="" alt="Wild Pokemon">
                    <svg id="pokeball-svg-display" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="46" fill="#000000" />
                        <circle cx="50" cy="50" r="42" fill="#ffffff" />
                        <path d="M 8,50 A 42,42 0 0,1 92,50 Z" fill="#ff1c1c" />
                        <rect x="4" y="46" width="92" height="8" fill="#000000" />
                        <circle cx="50" cy="50" r="14" fill="#000000" />
                        <circle cx="50" cy="50" r="8" fill="#ffffff" />
                    </svg>
                </div>
                <div class="quiz-right-panel">
                    <div id="popup-question">5 + 3 =</div>
                    <input type="number" id="math-answer" placeholder="?" autocomplete="off" pattern="[0-9]*" inputmode="numeric">
                </div>
            </div>
            
            <div id="feedback-banner"></div>
        </div>

        <div id="gameover-popup" class="game-overlay">
            <h1 id="gameover-title">🎉 Congratulations! 🎉</h1>
            <div id="gameover-caught-counter">You have caught 0 pokemons!</div>
            <div id="caught-showcase-container"></div>
            <button id="restart-btn" onclick="initGame()">Play Again</button>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <div id="arcade-controls">
        <div class="dpad-row">
            <div class="dpad-btn" id="btn-up">▲</div>
        </div>
        <div class="dpad-row">
            <div class="dpad-btn" id="btn-left">◀</div>
            <div class="dpad-spacer"></div>
            <div class="dpad-btn" id="btn-right">▶</div>
        </div>
        <div class="dpad-row">
            <div class="dpad-btn" id="btn-down">▼</div>
        </div>
    </div>
</div>

<script>
    let userHasInteracted = false;
    let activeTrack = 'none';

    const audioExplore = document.getElementById("audio-explore");
    const audioBattle = document.getElementById("audio-battle");
    const audioCatch = document.getElementById("audio-catch");
    const audioRunaway = document.getElementById("audio-runaway");

    audioExplore.volume = 0.30;
    audioBattle.volume = 0.30;
    audioCatch.volume = 0.50; 
    audioRunaway.volume = 0.50; 

    function syncTrackState() {
        if (!userHasInteracted) return;
        if (isGameOver) {
            audioExplore.pause();
            audioBattle.pause();
            activeTrack = 'none';
            return;
        }
        if (isPaused) {
            if (activeTrack !== 'battle' && activeTrack !== 'sfx_playing') {
                audioExplore.pause();
                audioExplore.currentTime = 0; 
                audioBattle.play().catch(e => console.log(e));
                activeTrack = 'battle';
            }
        } else {
            if (activeTrack !== 'explore') {
                audioBattle.pause();
                audioBattle.currentTime = 0; 
                audioExplore.play().catch(e => console.log(e));
                activeTrack = 'explore';
            }
        }
    }

    function unlockAudioStream() {
        if (userHasInteracted) return;
        userHasInteracted = true;
        audioExplore.play().then(() => audioExplore.pause()).catch(e => {});
        audioBattle.play().then(() => audioBattle.pause()).catch(e => {});
        audioCatch.play().then(() => audioCatch.pause()).catch(e => {});
        audioRunaway.play().then(() => audioRunaway.pause()).catch(e => {});
        syncTrackState();
    }

    window.addEventListener("click", unlockAudioStream);
    window.addEventListener("touchstart", unlockAudioStream);
    window.addEventListener("keydown", unlockAudioStream);

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    const mathPopup = document.getElementById("math-popup");
    const gameoverPopup = document.getElementById("gameover-popup");
    const caughtShowcaseContainer = document.getElementById("caught-showcase-container");
    const gameoverCaughtCounter = document.getElementById("gameover-caught-counter");
    const pokemonMsg = document.getElementById("popup-pokemon-message");
    const pokemonImgElement = document.getElementById("pokemon-image");
    const pokeballSvgDisplay = document.getElementById("pokeball-svg-display");
    const imagePanel = document.getElementById("image-panel");
    const popupQuestion = document.getElementById("popup-question");
    const mathAnswerInput = document.getElementById("math-answer");
    const feedbackBanner = document.getElementById("feedback-banner");

    const GRID_SIZE = 20;
    const HUD_HEIGHT = 100; 

    const POKEMON_LIST = [
        { id: "1", name: "Bulbasaur", tier: "normal" }, { id: "2", name: "Ivysaur", tier: "normal" }, { id: "3", name: "Venusaur", tier: "normal" },
        { id: "4", name: "Charmander", tier: "normal" }, { id: "5", name: "Charmeleon", tier: "normal" }, { id: "6", name: "Charizard", tier: "normal" },
        { id: "7", name: "Squirtle", tier: "normal" }, { id: "8", name: "Wartortle", tier: "normal" }, { id: "9", name: "Blastoise", tier: "normal" },
        { id: "12", name: "Butterfree", tier: "normal" }, { id: "25", name: "Pikachu", tier: "normal" }, { id: "26", name: "Raichu", tier: "normal" },
        { id: "35", name: "Clefairy", tier: "normal" }, { id: "37", name: "Vulpix", tier: "normal" }, { id: "38", name: "Ninetales", tier: "normal" },
        { id: "39", name: "Jigglypuff", tier: "normal" }, { id: "52", name: "Meowth", tier: "normal" }, { id: "54", name: "Psyduck", tier: "normal" },
        { id: "55", name: "Golduck", tier: "normal" }, { id: "58", name: "Growlithe", tier: "normal" }, { id: "59", name: "Arcanine", tier: "normal" },
        { id: "60", name: "Poliwag", tier: "normal" }, { id: "63", name: "Abra", tier: "normal" }, { id: "65", name: "Alakazam", tier: "normal" },
        { id: "77", name: "Ponyta", tier: "normal" }, { id: "78", name: "Rapidash", tier: "normal" }, { id: "79", name: "Slowpoke", tier: "normal" },
        { id: "92", name: "Gengar", tier: "normal" }, { id: "95", name: "Onix", tier: "normal" }, { id: "104", name: "Cubone", tier: "normal" },
        { id: "113", name: "Chansey", tier: "normal" }, { id: "131", name: "Lapras", tier: "normal" }, { id: "132", name: "Ditto", tier: "normal" },
        { id: "133", name: "Eevee", tier: "normal" }, { id: "134", name: "Vaporeon", tier: "normal" }, { id: "135", name: "Jolteon", tier: "normal" },
        { id: "136", name: "Flareon", tier: "normal" }, { id: "143", name: "Snorlax", tier: "normal" }, { id: "149", name: "Dragonite", tier: "normal" }, 
        { id: "175", name: "Togepi", tier: "normal" },

        { id: "144", name: "Articuno", tier: "legendary" }, 
        { id: "145", name: "Zapdos", tier: "legendary" }, 
        { id: "146", name: "Moltres", tier: "legendary" }, 
        { id: "150", name: "Mewtwo", tier: "legendary" }, 
        { id: "151", name: "Mew", tier: "legendary" },
        { id: "382", name: "Kyogre", tier: "legendary" },  
        { id: "791", name: "Solgaleo", tier: "legendary" }, 
        { id: "1007", name: "Koraidon", tier: "legendary" },
        { id: "249", name: "Lugia", tier: "legendary" },   
        { id: "250", name: "Ho-Oh", tier: "legendary" }    
    ];

    let snake, direction, nextDirection, speed;
    let currentQuestion, activeFood, currentSelectedPokemon;
    let lastRenderTime = 0;
    let isPaused = false;
    let isGameOver = false; 
    let isProcessingAnswer = false; 
    let growthQueue = 0; 
    let gameFrameCount = 0; 
    let animationFrameId = null;
    let confettiParticles = [];
    let availablePokemonDeck = [];
    let caughtPokemons = []; 

    function shuffleDeck() {
        for (let i = availablePokemonDeck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [availablePokemonDeck[i], availablePokemonDeck[j]] = [availablePokemonDeck[j], availablePokemonDeck[i]];
        }
    }

    function initGame() {
        gameoverPopup.classList.remove("show");
        mathPopup.classList.remove("show");
        mathPopup.classList.remove("legendary-popup-active");

        snake = [
            {x: 100, y: 200},
            {x: 80, y: 200},
            {x: 60, y: 200}
        ];
        direction = "RIGHT";
        nextDirection = "RIGHT";
        speed = 2.5; 
        growthQueue = 0;
        confettiParticles = [];
        caughtPokemons = []; 
        isPaused = false;
        isGameOver = false;
        isProcessingAnswer = false;
        
        activeTrack = 'none';
        syncTrackState();

        availablePokemonDeck = [...POKEMON_LIST];
        shuffleDeck();
        spawnFood();
        
        lastRenderTime = performance.now();
        if (!animationFrameId) {
            animationFrameId = window.requestAnimationFrame(mainGameLoop);
        }
    }

    function generateQuestion(tier) {
        let num1, num2, ans, text;
        if (tier === "legendary") {
            const randType = Math.random();
            if (randType < 0.5) {
                num1 = Math.floor(Math.random() * 9) + 1; 
                num2 = Math.floor(Math.random() * 9) + 1; 
                ans = num1 * num2;
                text = `${num1} × ${num2}`;
            } else {
                const isAddition = Math.random() > 0.5;
                if (isAddition) {
                    num1 = Math.floor(Math.random() * 240) + 100; 
                    num2 = Math.floor(Math.random() * 150) + 100; 
                    ans = num1 + num2;
                    text = `${num1} + ${num2}`;
                } else {
                    num1 = Math.floor(Math.random() * 300) + 199; 
                    num2 = Math.floor(Math.random() * (num1 - 100)) + 100; 
                    ans = num1 - num2;
                    text = `${num1} - ${num2}`;
                }
            }
        } else {
            const isAddition = Math.random() > 0.5;
            if (isAddition) {
                num1 = Math.floor(Math.random() * 90) + 10; 
                num2 = Math.floor(Math.random() * 89) + 10; 
                ans = num1 + num2;
                text = `${num1} + ${num2}`;
            } else {
                num1 = Math.floor(Math.random() * 90) + 10; 
                num2 = Math.floor(Math.random() * (num1 - 1)) + 1; 
                ans = num1 - num2;
                text = `${num1} - ${num2}`;
            }
        }
        return { text: text, answer: ans };
    }

    function getRandomGridPos() {
        let pos;
        const totalCols = canvas.width / GRID_SIZE;  
        const grassStartRow = HUD_HEIGHT / GRID_SIZE; 
        const totalGrassRows = (canvas.height - HUD_HEIGHT) / GRID_SIZE; 
        const targetRowRange = Math.floor(totalGrassRows * (2 / 3)); 

        while (true) {
            const gridX = Math.floor(Math.random() * totalCols);
            const gridY = Math.floor(Math.random() * targetRowRange) + grassStartRow;
            const x = gridX * GRID_SIZE;
            const y = gridY * GRID_SIZE;

            if (y < HUD_HEIGHT || y >= (HUD_HEIGHT + (targetRowRange * GRID_SIZE))) continue;

            const collision = snake.some(segment => segment.x === x && segment.y === y);
            if (!collision) {
                pos = {x, y};
                break;
            }
        }
        return pos;
    }

    function spawnFood() {
        activeFood = {
            pos: getRandomGridPos(),
            name: "Pokeball",
            color: "#ff0000",
            secondary: "#ffffff"
        };
    }

    function triggerMathPopup() {
        if (availablePokemonDeck.length === 0) {
            triggerGameOver();
            return;
        }

        audioCatch.load();
        audioRunaway.load();

        isPaused = true;
        isProcessingAnswer = false;
        
        currentSelectedPokemon = availablePokemonDeck.pop();
        currentQuestion = generateQuestion(currentSelectedPokemon.tier);
        
        pokemonImgElement.style.opacity = "1";
        pokemonImgElement.style.transform = "scale(1) translateX(0px)"; 
        pokemonImgElement.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${currentSelectedPokemon.id}.png`;
        pokemonImgElement.style.display = "block";
        
        pokeballSvgDisplay.style.display = "none";
        pokeballSvgDisplay.style.transform = "scale(0) rotate(0deg)";
        
        const oldStars = imagePanel.querySelectorAll('.capture-star-svg');
        oldStars.forEach(s => s.remove());

        pokemonMsg.classList.remove("legendary-alert");
        mathPopup.classList.remove("legendary-popup-active");
        mathPopup.classList.add("show");
        
        syncTrackState(); 

        if (currentSelectedPokemon.tier === "legendary") {
            pokemonMsg.textContent = `🚨 LEGENDARY: ${currentSelectedPokemon.name}! 🚨`;
            pokemonMsg.classList.add("legendary-alert");
            mathPopup.classList.add("legendary-popup-active"); 
        } else {
            pokemonMsg.textContent = `Catch ${currentSelectedPokemon.name}!`;
        }

        popupQuestion.textContent = `${currentQuestion.text} =`;
        mathAnswerInput.value = "";
        feedbackBanner.textContent = "";
        feedbackBanner.className = "";
        
        setTimeout(() => mathAnswerInput.focus(), 50);
    }

    function triggerStarBurstVector() {
        const colors = ['#ffde00', '#ff6f00', '#ffffff', '#00ff66', '#00ffff'];
        for (let i = 0; i < 12; i++) {
            const svgNamespace = "http://www.w3.org/2000/svg";
            const starSvg = document.createElementNS(svgNamespace, "svg");
            starSvg.setAttribute("class", "capture-star-svg");
            starSvg.setAttribute("viewBox", "0 0 20 20");
            
            const path = document.createElementNS(svgNamespace, "path");
            path.setAttribute("d", "M10 0L13.09 6.26L20 7.27L15 12.14L16.18 19.02L10 15.77L3.82 19.02L5 12.14L0 7.27L6.91 6.26L10 0Z");
            path.setAttribute("fill", colors[Math.floor(Math.random() * colors.length)]);
            
            starSvg.appendChild(path);
            
            const angle = (i * 30) * (Math.PI / 180);
            const distance = Math.floor(Math.random() * 50) + 75; 
            const tx = Math.cos(angle) * distance + 'px';
            const ty = Math.sin(angle) * distance + 'px';
            
            starSvg.style.setProperty('--tx', tx);
            starSvg.style.setProperty('--ty', ty);
            starSvg.style.animation = `burstOutVector 0.9s forwards cubic-bezier(0.1, 0.8, 0.3, 1)`;
            
            imagePanel.appendChild(starSvg);
        }
    }

    function triggerGameOver() {
        isGameOver = true;
        isPaused = true;
        syncTrackState(); 
        
        const titleElement = document.getElementById("gameover-title");
        if (caughtPokemons.length === POKEMON_LIST.length) {
            titleElement.textContent = "🏆 Master Trainer! 🏆";
        } else {
            titleElement.textContent = "🎉 Congratulations! 🎉";
        }

        gameoverCaughtCounter.textContent = `You have caught ${caughtPokemons.length} pokemons!`;
        caughtShowcaseContainer.innerHTML = "";

        const normalGroup = caughtPokemons.filter(p => p.tier === "normal");
        const legendaryGroup = caughtPokemons.filter(p => p.tier === "legendary");

        function createShowcaseGroup(headerTitle, isLegendary, groupItems) {
            const titleDiv = document.createElement("div");
            titleDiv.className = `showcase-section-title ${isLegendary ? 'legendary-header' : ''}`;
            titleDiv.textContent = `${headerTitle} (${groupItems.length})`;
            caughtShowcaseContainer.appendChild(titleDiv);

            if (groupItems.length === 0) {
                const emptyText = document.createElement("div");
                emptyText.className = "no-caught-text";
                emptyText.textContent = isLegendary ? "No Legendary Pokémon caught." : "No Normal Pokémon caught.";
                caughtShowcaseContainer.appendChild(emptyText);
            } else {
                const gridDiv = document.createElement("div");
                gridDiv.className = "caught-grid";

                groupItems.forEach(poke => {
                    const card = document.createElement("div");
                    card.className = `caught-card ${isLegendary ? 'legendary-card' : ''}`;
                    
                    const img = document.createElement("img");
                    img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${poke.id}.png`;
                    
                    const label = document.createElement("span");
                    label.textContent = poke.name;
                    
                    card.appendChild(img);
                    card.appendChild(label);
                    gridDiv.appendChild(card);
                });
                caughtShowcaseContainer.appendChild(gridDiv);
            }
        }

        createShowcaseGroup("✨ Legendary Pokémon ✨", true, legendaryGroup);
        createShowcaseGroup("🍃 Normal Pokémon 🍃", false, normalGroup);
        
        createConfetti(); 
        gameoverPopup.classList.add("show");
        caughtShowcaseContainer.scrollTop = 0; 
    }

    function createConfetti() {
        confettiParticles = [];
        const colors = ['#ffd700', '#ff3333', '#3333ff', '#33ff33', '#ff00ff', '#00ffff'];
        for (let i = 0; i < 100; i++) {
            confettiParticles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * (HUD_HEIGHT - 50) + HUD_HEIGHT, 
                r: Math.random() * 6 + 4,
                d: Math.random() * canvas.height,
                color: colors[Math.floor(Math.random() * colors.length)],
                tilt: Math.random() * 10 - 5,
                tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                tiltAngle: 0
            });
        }
    }

    function updateAndDrawConfetti() {
        confettiParticles.forEach((p) => {
            p.tiltAngle += p.tiltAngleIncremental;
            p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2; 
            p.x += Math.sin(p.tiltAngle);
            p.tilt = Math.sin(p.tiltAngle - confettiParticles.indexOf(p) / 3) * 15;

            if (p.y > canvas.height) {
                p.y = HUD_HEIGHT - 10;
                p.x = Math.random() * canvas.width;
            }

            ctx.save();
            ctx.lineWidth = p.r;
            ctx.strokeStyle = p.color;
            ctx.beginPath();
            ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
            ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
            ctx.stroke();
            ctx.restore();
        });
    }

    mathAnswerInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") processMathAnswer();
    });

    function processMathAnswer() {
        if (isProcessingAnswer || mathAnswerInput.value.trim() === "") return;
        isProcessingAnswer = true; 
        const playerAnswer = parseInt(mathAnswerInput.value);
        audioBattle.pause();

        if (playerAnswer === currentQuestion.answer) {
            activeTrack = 'sfx_playing';
            audioCatch.currentTime = 0; 
            audioCatch.play().catch(e => console.log(e));

            caughtPokemons.push(currentSelectedPokemon);
            
            pokemonImgElement.style.transform = "scale(0)";
            pokemonImgElement.style.opacity = "0";

            setTimeout(() => {
                pokemonImgElement.style.display = "none";
                pokeballSvgDisplay.style.display = "block";
                setTimeout(() => {
                    pokeballSvgDisplay.style.transform = "scale(1.1) rotate(360deg)";
                    triggerStarBurstVector();
                }, 40);
            }, 250);

            feedbackBanner.textContent = `Good job! You caught ${currentSelectedPokemon.name}!`;
            feedbackBanner.className = "success-text";
            speed += 0.3; 
            growthQueue += 1; 

            setTimeout(() => {
                mathPopup.classList.remove("show");
                isPaused = false;
                isProcessingAnswer = false;
                if (availablePokemonDeck.length === 0) {
                    triggerGameOver();
                } else {
                    syncTrackState();
                    spawnFood();
                    lastRenderTime = performance.now();
                }
            }, 4000); 
        } else {
            activeTrack = 'sfx_playing';
            audioRunaway.currentTime = 0;
            audioRunaway.play().catch(e => console.log(e));

            availablePokemonDeck.push(currentSelectedPokemon);
            shuffleDeck(); 

            pokemonImgElement.style.transform = "translateX(250px) scale(0.4)";
            pokemonImgElement.style.opacity = "0";

            feedbackBanner.textContent = `Oh no! ${currentSelectedPokemon.name} ran away!`;
            feedbackBanner.className = "fail-text";
            if (snake.length > 2) snake.pop(); 
            
            setTimeout(() => {
                mathPopup.classList.remove("show");
                isPaused = false;
                isProcessingAnswer = false;
                syncTrackState();
                spawnFood();
                lastRenderTime = performance.now();
            }, 3000); 
        }
    }

    function mainGameLoop(currentTime) {
        animationFrameId = window.requestAnimationFrame(mainGameLoop);
        if (isPaused) {
            if (isGameOver) draw(); 
            return;
        }
        const secondsSinceLastRender = (currentTime - lastRenderTime) / 1000;
        if (secondsSinceLastRender < 1 / speed) return;
        
        lastRenderTime = currentTime;
        update();
        draw();
    }

    function update() {
        gameFrameCount++;
        direction = nextDirection;
        const head = {x: snake[0].x, y: snake[0].y};

        if (direction === "UP") head.y -= GRID_SIZE;
        else if (direction === "DOWN") head.y += GRID_SIZE;
        else if (direction === "LEFT") head.x -= GRID_SIZE;
        else if (direction === "RIGHT") head.x += GRID_SIZE;

        if (head.x >= canvas.width) head.x = 0;
        else if (head.x < 0) head.x = canvas.width - GRID_SIZE;
        if (head.y >= canvas.height) head.y = HUD_HEIGHT;
        else if (head.y < HUD_HEIGHT) head.y = canvas.height - GRID_SIZE;

        if (snake.some((segment, index) => index !== 0 && segment.x === head.x && segment.y === head.y)) {
            triggerGameOver();
            return;
        }
        snake.unshift(head);

        if (activeFood && head.x === activeFood.pos.x && head.y === activeFood.pos.y) {
            triggerMathPopup();
            snake.pop(); 
        } else {
            if (growthQueue > 0) growthQueue--; else snake.pop();
        }
    }

    function drawRoundRect(ctx, x, y, width, height, radius, fill, stroke) {
        if (typeof radius === 'number') { radius = {tl: radius, tr: radius, br: radius, bl: radius}; }
        ctx.beginPath();
        ctx.moveTo(x + radius.tl, y);
        ctx.lineTo(x + width - radius.tr, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius.tr);
        ctx.lineTo(x + width, y + height - radius.br);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius.br, y + height);
        ctx.lineTo(x + radius.bl, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius.bl);
        ctx.lineTo(x, y + radius.tl);
        ctx.quadraticCurveTo(x, y, x + radius.tl, y);
        ctx.closePath();
        if (fill) ctx.fill();
    }

    function drawPokeball(x, y, radius, angle = 0) {
        ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
        ctx.lineWidth = radius * 0.1; ctx.strokeStyle = "#000"; ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#ff0000"; ctx.beginPath(); ctx.arc(0, 0, radius, Math.PI, 0); ctx.lineTo(0, 0); ctx.fill(); ctx.stroke();
        ctx.lineWidth = radius * 0.15; ctx.beginPath(); ctx.moveTo(-radius, 0); ctx.lineTo(radius, 0); ctx.stroke();
        ctx.fillStyle = "#fff"; ctx.lineWidth = radius * 0.1; ctx.beginPath(); ctx.arc(0, 0, radius * 0.3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.restore();
    }

    function drawGrass(x, y, width, height) {
        ctx.fillStyle = "#81c784"; ctx.fillRect(x, y, width, height);
        ctx.fillStyle = "#4caf50";
        for (let i = 0; i < 40; i++) {
            const seed = Math.sin(i * 9.8) * 10000;
            const tx = x + (seed - Math.floor(seed)) * width;
            const ty = y + ((seed * 10) - Math.floor(seed * 10)) * height;
            ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx - 2, ty + 6); ctx.lineTo(tx + 2, ty + 6); ctx.fill();
        }
    }

    function drawFoodIcon(food, time) {
        if (!food) return;
        const x = food.pos.x + GRID_SIZE/2;
        const y = food.pos.y + GRID_SIZE/2;
        const radius = GRID_SIZE/2 * (1 + Math.sin(time * 0.15) * 0.08); 
        ctx.save(); ctx.shadowBlur = 10; ctx.shadowColor = "#ff0000";
        drawPokeball(x, y, radius);
        ctx.restore();
    }

    function drawSnake() {
        snake.forEach((segment, index) => {
            ctx.save();
            const x = segment.x + GRID_SIZE/2;
            const y = segment.y + GRID_SIZE/2;
            if (index === 0) {
                ctx.fillStyle = "#1b5e20"; ctx.beginPath(); ctx.arc(x, y, GRID_SIZE/2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(x - 5, y - 3, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 5, y - 3, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(x - 5, y - 3, 1.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 5, y - 3, 1.5, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.fillStyle = (index % 2 === 0) ? "#2e7d32" : "#4caf50";
                drawRoundRect(ctx, segment.x + 1, segment.y + 1, GRID_SIZE - 2, GRID_SIZE - 2, 5, true, false);
            }
            ctx.restore();
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGrass(0, HUD_HEIGHT, canvas.width, canvas.height - HUD_HEIGHT);
        ctx.fillStyle = "#ff0000"; ctx.fillRect(0, 0, canvas.width, HUD_HEIGHT/2);
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0, HUD_HEIGHT/2, canvas.width, HUD_HEIGHT/2);
        
        ctx.textBaseline = "middle"; ctx.fillStyle = "#ffde00"; ctx.strokeStyle = "#3b4cca"; ctx.lineWidth = 4;
        ctx.font = "bold 36px 'Comic Sans MS', cursive"; ctx.textAlign = "left";
        ctx.strokeText("Catch them all!", 60, HUD_HEIGHT/2); ctx.fillText("Catch them all!", 60, HUD_HEIGHT/2);
        drawPokeball(30, HUD_HEIGHT/2, 18);

        ctx.fillStyle = "#333"; ctx.font = "bold 26px 'Comic Sans MS', cursive"; ctx.textAlign = "right";
        ctx.fillText("Caught: " + caughtPokemons.length, canvas.width - 20, HUD_HEIGHT/2);

        ctx.strokeStyle = "#000"; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(0, HUD_HEIGHT); ctx.lineTo(canvas.width, HUD_HEIGHT); ctx.stroke();

        if (activeFood && !isGameOver) drawFoodIcon(activeFood, gameFrameCount);
        drawSnake();
        if (isGameOver) updateAndDrawConfetti();
    }

    function handleMobileInput(targetDir) {
        if (isPaused) return;
        if (targetDir === "UP" && direction !== "DOWN") nextDirection = "UP";
        if (targetDir === "DOWN" && direction !== "UP") nextDirection = "DOWN";
        if (targetDir === "LEFT" && direction !== "RIGHT") nextDirection = "LEFT";
        if (targetDir === "RIGHT" && direction !== "LEFT") nextDirection = "RIGHT";
    }

    // High performance pointer and touch listeners mapped to direction logic
    document.getElementById("btn-up").addEventListener("touchstart", (e) => { e.preventDefault(); handleMobileInput("UP"); });
    document.getElementById("btn-down").addEventListener("touchstart", (e) => { e.preventDefault(); handleMobileInput("DOWN"); });
    document.getElementById("btn-left").addEventListener("touchstart", (e) => { e.preventDefault(); handleMobileInput("LEFT"); });
    document.getElementById("btn-right").addEventListener("touchstart", (e) => { e.preventDefault(); handleMobileInput("RIGHT"); });

    initGame();
</script>
